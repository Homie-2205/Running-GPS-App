<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Convertir Video a MP3 cristian</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: .5rem 1rem; font-size: 1rem; }
    .log { white-space: pre-wrap; background:#f7f7f7; padding: .5rem; border: 1px solid #ddd; max-height:200px; overflow:auto; }
  </style>
</head>
<body>
  <h1>Convertir Video a MP3 (en el navegador)</h1>

  <p>
    Selecciona un archivo de vídeo (MP4, WEBM, MKV, etc.) y pulsa "Convertir a MP3".
    El proceso ocurre en tu navegador usando WebAssembly; no se sube nada a servidores.
  </p>

  <input id="fileInput" type="file" accept="video/*" />
  <button id="convertBtn" disabled>Convertir a MP3</button>
  <button id="cancelBtn" disabled>Cancelar</button>
  <p id="status">Estado: esperando archivo</p>

  <p>
    <a id="downloadLink" href="#" style="display:none">Descargar MP3</a>
  </p>

  <h3>Registro / Progreso</h3>
  <div id="log" class="log"></div>

  <!-- ffmpeg.wasm desde unpkg (paquete @ffmpeg/ffmpeg) -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.8/dist/ffmpeg.min.js"></script>
  <script>
    (function () {
      const { createFFmpeg, fetchFile } = FFmpeg;
      const ffmpeg = createFFmpeg({ log: true }); // log:true para ver salida
      const fileInput = document.getElementById('fileInput');
      const convertBtn = document.getElementById('convertBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const statusEl = document.getElementById('status');
      const logEl = document.getElementById('log');
      const downloadLink = document.getElementById('downloadLink');

      let aborted = false;

      // Muestra mensajes en la caja de log
      function appendLog(msg) {
        const time = new Date().toLocaleTimeString();
        logEl.textContent += `[${time}] ${msg}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      // resumen de progreso: ratio 0..1
      ffmpeg.setProgress(({ ratio }) => {
        const pct = Math.round(ratio * 100);
        statusEl.textContent = `Estado: procesando... ${pct}%`;
      });

      // logger (salida de ffmpeg)
      ffmpeg.setLogger(({ type, message }) => {
        appendLog(message);
      });

      // Habilitar botón cuando hay archivo
      fileInput.addEventListener('change', () => {
        downloadLink.style.display = 'none';
        if (fileInput.files && fileInput.files.length) {
          convertBtn.disabled = false;
          statusEl.textContent = `Estado: listo para convertir "${fileInput.files[0].name}"`;
        } else {
          convertBtn.disabled = true;
          statusEl.textContent = 'Estado: esperando archivo';
        }
      });

      // Botón cancelar (simple bandera)
      cancelBtn.addEventListener('click', () => {
        aborted = true;
        statusEl.textContent = 'Estado: cancelado por el usuario';
        appendLog('Proceso marcado como cancelado.');
        cancelBtn.disabled = true;
        convertBtn.disabled = false;
      });

      // Conversión
      convertBtn.addEventListener('click', async () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        convertBtn.disabled = true;
        cancelBtn.disabled = false;
        aborted = false;
        appendLog(`Iniciando conversión de: ${file.name}`);

        try {
          if (!ffmpeg.isLoaded()) {
            appendLog('Cargando ffmpeg.wasm (puede tardar unos segundos)...');
            await ffmpeg.load();
            appendLog('ffmpeg cargado.');
          }

          // Nombre interno en el FS virtual
          const inputName = 'input' + file.name.substring(file.name.lastIndexOf('.'));
          const outputName = 'output.mp3';

          // Escribir archivo en FS virtual
          appendLog(`Escribiendo archivo en FS virtual como ${inputName}...`);
          ffmpeg.FS('writeFile', inputName, await fetchFile(file));

          if (aborted) throw new Error('cancelado');

          // Ejecutar conversión: quita video (-vn), fija bitrate y sample rate
          appendLog('Ejecutando ffmpeg: extraer audio a MP3...');
          await ffmpeg.run(
            '-i', inputName,
            '-vn',               // sin video
            '-ab', '192k',      // bitrate audio
            '-ar', '44100',     // sample rate
            '-y',               // sobrescribir sin preguntar
            outputName
          );

          if (aborted) throw new Error('cancelado');

          // Leer el resultado y crear URL para descargar
          appendLog('Leyendo archivo resultante...');
          const data = ffmpeg.FS('readFile', outputName);
          const blob = new Blob([data.buffer], { type: 'audio/mpeg' });
          const url = URL.createObjectURL(blob);

          downloadLink.href = url;
          downloadLink.download = (file.name.replace(/\.[^/.]+$/, '') || 'audio') + '.mp3';
          downloadLink.style.display = 'inline';
          statusEl.textContent = 'Estado: conversión completada';
          appendLog('Conversión completada exitosamente.');
        } catch (err) {
          if (err.message === 'cancelado') {
            appendLog('Proceso cancelado antes de finalizar.');
            statusEl.textContent = 'Estado: cancelado';
          } else {
            appendLog('Error: ' + (err.message || err));
            statusEl.textContent = 'Estado: error durante la conversión';
            console.error(err);
          }
        } finally {
          cancelBtn.disabled = true;
          convertBtn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
