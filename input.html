<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso</title>
</head>
<body>
    <style>
        body {
            font-family: Arial, sans-serif;
            /* Se integra la imagen del jaguar optimizada en alta calidad directamente en el CSS */
            background-image: url("Jaguar.png"), url("https://unsplash.com");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Organized Dashboard Container */
        .dashboard {
            background-color: rgba(0, 0, 0, 0.55); /* Un poco más oscuro para que resalte frente al fondo del jaguar */
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .dashboard-title {
            color: #ffffff;
            margin: 0 0 5px 0;
            font-size: 22px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* Buttons organized into a neat horizontal layout */
        .controls-container {
            display: flex;
            gap: 14px;
            justify-content: center;
            align-items: center;
        }

        /* Clean Base Button Styling (Verde y Blanco) */
        button {
            width: 55px; 
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1e5e2f; /* Verde base elegante */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; 
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.2s ease-in-out;
            padding: 0; 
        }

        /* Iconos PNG grandes, limpios y blancos */
        button img {
            width: 28px;  
            height: 28px;
            object-fit: contain;
            pointer-events: none; 
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-3px);
            background-color: #28a745; /* Verde brillante al pasar el mouse */
            box-shadow: 0 6px 14px rgba(40, 167, 69, 0.4);
        }

        button:hover img {
            transform: scale(1.08); /* Reacción al pasar el cursor */
        }

        button:active {
            transform: translateY(0);
        }

        /* Variación para estados dinámicos controlados por JS */
        .btn-danger-state {
            background-color: #bd2130 !important;
        }
        .btn-danger-state:hover {
            background-color: #dc3545 !important;
            box-shadow: 0 6px 14px rgba(220, 53, 69, 0.4) !important;
        }

        /* Video element hidden cleanly for PiP hack */
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>


<h2>Ingrese su código</h2>

<input type="password" id="codigo" placeholder="Código de acceso">
<button onclick="verificar()">Entrar</button>

<p id="mensaje"></p>

<script>
// Aquí puedes colocar hasta 500 códigos o más
const codigos = [
"AB12-CD34",
"ZX98-QW11",
"USR001",
"USR002",
"USR003",
"USR004",
"USR005"
// ... continúa hasta 500 códigos
];

function verificar(){
    const c = document.getElementById("codigo").value.trim();

    if(codigos.includes(c)){
        document.getElementById("mensaje").textContent = "Acceso permitido";
        // Redireccionar
        window.location.href = "camera.html";
    }else{
        document.getElementById("mensaje").textContent = "Código incorrecto";
    }
}
</script>

</body>
</html>
