    <title>Popup Content</title>
   <style>
        body { 
        background-image: url("fondo.jpg");
        font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;  }
        .controls { margin-bottom: 20px; }
        button { font-size: 16px; padding: 10px 20px; margin: 0 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        #startBtn { background-color: #28a745; color: white; }
        #stopBtn { background-color: #dc3545; color: white; }
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; }
        video { width: 80%; max-width: 800px; border: 2px solid #333; background: #000; border-radius: 8px; }
    </style>
</head>

    <!-- Preview player to see what is being recorded -->
