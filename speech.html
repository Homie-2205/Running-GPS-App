<input type="text" id="userName" placeholder="Enter your name">

<button class="custom-button" onclick="greetUser()">Salúdame</button>

<p id="greetingText"></p>

<script>
function greetUser() {
    const name = document.getElementById("userName").value;
    const display = document.getElementById("greetingText");

    let message;

    if (name.trim() !== "") {
        message = `Hello, ${name}! How are you today?`;
    } else {
        message = "Please enter your name.";
    }

    display.textContent = message;

    // Speak the message
    const speech = new SpeechSynthesisUtterance(message);
    speech.lang = "en-US";      // Change to "es-ES" for Spanish or "fr-FR" for French
    speech.rate = 1;            // Speed (0.1 to 10)
    speech.pitch = 1;           // Voice pitch
    speech.volume = 1;          // Volume (0 to 1)

    // Select an English AI voice if available
    const voices = window.speechSynthesis.getVoices();
    const englishVoice = voices.find(v => v.lang.startsWith("en"));
    if (englishVoice) {
        speech.voice = englishVoice;
    }

    window.speechSynthesis.cancel(); // Stop any previous speech
    window.speechSynthesis.speak(speech);
}

// Load voices when they become available
window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
};
</script>
