<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <title>Modern Responsive Layout</title>
    <style>
    
        .container2 {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        #display {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.1s, opacity 0.2s;
        }
        /* The Red Button */
        #startStop {
            background-color: #ff4d4d;
            color: white;
        }
        #reset {
            background-color: #e0e0e0;
            color: #333;
        }
        button:active {
            transform: scale(0.95);
        }
        
    
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Georgia, serif; }
        body { background-color: #f4f7f6; color: #333; line-height: 1.6; }

        /* Navigation */
        nav {
        
            background: #ffff1a;
            color: black;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav ul {  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #ffff1a; }
  
        nav ul li {  float: left;}
        nav ul li a {  display: block;
  color: black;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
 }
        nav a:hover {  background-color: #e6ffe6; }

        /* Header (Hero Section) */
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('land.jpg');
            background-size: cover;
            background-position: center;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: black;
            text-align: center;
            padding: 0 20px;
        }
        header h1 { font-size: 3.5rem; margin-bottom: 10px; }
        header p { font-size: 1.2rem; max-width: 600px; }

        /* Main Content Grid */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* Content Blocks */
        .main-content { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .sidebar { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); height: fit-content; }

        h2 { color: #2c3e50; margin-bottom: 15px;
        font-size: 30px;
        font-family: Georgia, Serif;
         letter-spacing: 5px;
         
        }
        p { margin-bottom: 20px;
        font-size: 19px;
        font-family: Georgia, Serif;
         text-align: left;
         
        }

        /* Images */
        .content-img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            header h1 { font-size: 2.5rem; }
            nav { flex-direction: column; }
            nav ul { margin-top: 15px; }
         nav   ul li a:hover {
  background-color: #003300;
}
        }
    </style>
</head>
<body>

    <!-- Content Area -->
    <div class="container">
        <!-- Main Content -->
        <div class="main-content">
            <h2>Alma de Atleta</h2>

<script>
    let startTime;
    let elapsedTime = 0;
    let timerInterval;

    function timeToString(time) {
        let diffInMin = time / 60000;
        let mm = Math.floor(diffInMin);
        let diffInSec = (diffInMin - mm) * 60;
        let ss = Math.floor(diffInSec);
        let diffInMs = (diffInSec - ss) * 100;
        let ms = Math.floor(diffInMs);
        return `${mm.toString().padStart(2, "0")}:${ss.toString().padStart(2, "0")}.${ms.toString().padStart(2, "0")}`;
    }

    function print(txt) { document.getElementById("display").innerHTML = txt; }

    function start() {
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(() => {
            elapsedTime = Date.now() - startTime;
            print(timeToString(elapsedTime));
        }, 10);
        document.getElementById("startStop").innerHTML = "Stop";
    }

    function stop() {
        clearInterval(timerInterval);
        document.getElementById("startStop").innerHTML = "Start";
    }

    function reset() {
        clearInterval(timerInterval);
        print("00:00.00");
        elapsedTime = 0;
        document.getElementById("startStop").innerHTML = "Start";
    }

    document.getElementById("startStop").addEventListener("click", () => {
        if (document.getElementById("startStop").innerHTML === "Start") start();
        else stop();
    });

    document.getElementById("reset").addEventListener("click", reset);
</script>
    

</body>
